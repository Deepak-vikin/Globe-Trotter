<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Globe Trotter | Register</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
    <div class="card">
        <div class="logo">🌍 GlobeTrotter</div>
        <h1>Create Account</h1>
        <p class="sub">Begin your journey — thousands of destinations await</p>

        <form id="registerForm">
            <input type="text" id="regName" placeholder="Full Name" required />
            <input type="email" id="regEmail" placeholder="Email Address" required />
            <input type="password" id="regPassword" placeholder="Create Password" required />
            <input type="password" id="regConfirm" placeholder="Confirm Password" required />

            <div class="section-label">
                📍 Your Location
                <span class="section-hint">(Provide Valid Details)</span>
            </div>
            <input type="text" id="regCity" placeholder="City" required />
            <input type="text" id="regState" placeholder="State / Province" required />
            <input type="text" id="regCountry" placeholder="Country" required />

            <div id="registerStatus" class="status"></div>
            <button type="submit" id="registerBtn">Create My Account</button>
        </form>

        <div class="divider">Already have an account?</div>
        <a class="link-btn" href="index.html">← Back to Sign In</a>
    </div>
    <script src="sample.js"></script>
</body>

</html>
