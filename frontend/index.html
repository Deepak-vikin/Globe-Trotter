<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Globe Trotter | Sign In</title>
  <link rel="stylesheet" href="style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="card">
    <div class="logo">🌍 GlobeTrotter</div>
    <h1>Sign In</h1>
    <p class="sub">Continue your journey around the world</p>

    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email Address" required />
      <div class="password-container">
        <input type="password" id="loginPassword" placeholder="Password" required />
        <span class="toggle-password" id="togglePasswordBtn">
          <svg style="width:20px;height:20px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </span>
      </div>
      <div id="loginStatus" class="status"></div>
      <button type="submit" id="loginBtn">Sign In</button>
    </form>

    <div class="divider">New to Globe Trotter?</div>
    <a class="link-btn" href="register.html">Create an Account →</a>
  </div>
  <script src="sample.js"></script>
</body>

</html>
