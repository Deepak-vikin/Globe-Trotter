<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Globe Trotter | Sign In</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="card">
    <div class="logo">🌍 GlobeTrotter</div>
    <h1>Sign In</h1>
    <p class="sub">Continue your journey around the world</p>

    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email Address" required />
      <input type="password" id="loginPassword" placeholder="Password" required />
      <div id="loginStatus" class="status"></div>
      <button type="submit" id="loginBtn">Sign In</button>
    </form>

    <div class="divider">New to Globe Trotter?</div>
    <a class="link-btn" href="register.html">Create an Account →</a>
  </div>
  <script src="sample.js"></script>
</body>
</html>
